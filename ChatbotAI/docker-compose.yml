services:
  # ─── Databases ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_secret
      POSTGRES_DB: chatbot_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API Gateway ───
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - AUTH_SERVICE_URL=http://auth-service:4001
      - PRODUCT_SERVICE_URL=http://product-service:4002
      - ORDER_SERVICE_URL=http://order-service:4003
      - REVIEW_SERVICE_URL=http://review-service:4004
      - NOTIFICATION_SERVICE_URL=http://notification-service:4005
      - FILE_SERVICE_URL=http://file-service:4006
      - CHAT_SERVICE_URL=http://chat-service:4007
      - JWT_SECRET=chatbot_jwt_secret_key_2024
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ─── Auth Service ───
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - PORT=4001
      - DATABASE_URL=postgresql://chatbot:chatbot_secret@postgres:5432/chatbot_auth
      - JWT_SECRET=chatbot_jwt_secret_key_2024
      - JWT_REFRESH_SECRET=chatbot_refresh_secret_key_2024
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Product Service (replaces paper-service) ───
  product-service:
    build:
      context: .
      dockerfile: services/paper-service/Dockerfile
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=development
      - PORT=4002
      - DATABASE_URL=postgresql://chatbot:chatbot_secret@postgres:5432/chatbot_product
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=chatbot_jwt_secret_key_2024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Order Service (replaces conference-service) ───
  order-service:
    build:
      context: .
      dockerfile: services/conference-service/Dockerfile
    ports:
      - "4003:4003"
    environment:
      - NODE_ENV=development
      - PORT=4003
      - DATABASE_URL=postgresql://chatbot:chatbot_secret@postgres:5432/chatbot_order
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=chatbot_jwt_secret_key_2024
      - NOTIFICATION_SERVICE_URL=http://notification-service:4005
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Review Service ───
  review-service:
    build:
      context: .
      dockerfile: services/review-service/Dockerfile
    ports:
      - "4004:4004"
    environment:
      - NODE_ENV=development
      - PORT=4004
      - DATABASE_URL=postgresql://chatbot:chatbot_secret@postgres:5432/chatbot_review
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=chatbot_jwt_secret_key_2024
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Notification Service ───
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "4005:4005"
    environment:
      - NODE_ENV=development
      - PORT=4005
      - DATABASE_URL=postgresql://chatbot:chatbot_secret@postgres:5432/chatbot_notification
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=chatbot_jwt_secret_key_2024
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USER=your_email@gmail.com
      - MAIL_PASS=your_app_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── File Service ───
  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    ports:
      - "4006:4006"
    environment:
      - NODE_ENV=development
      - PORT=4006
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
    volumes:
      - uploads_data:/app/uploads

  # ─── Chat/AI Service (replaces scheduler-service) ───
  chat-service:
    build:
      context: .
      dockerfile: services/scheduler-service/Dockerfile
    ports:
      - "4007:4007"
    environment:
      - NODE_ENV=development
      - PORT=4007
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - PRODUCT_SERVICE_URL=http://product-service:4002
      - REVIEW_SERVICE_URL=http://review-service:4004
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
