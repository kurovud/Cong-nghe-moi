<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder image</title>
  <desc id="desc">Neutral fallback image for products without an uploaded photo</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="28" fill="url(#bg)" />
  <rect x="32" y="32" width="536" height="336" rx="22" fill="none" stroke="rgba(255,255,255,0.12)" />
  <g opacity="0.9">
    <rect x="170" y="110" width="260" height="160" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" />
    <circle cx="242" cy="160" r="18" fill="url(#accent)" opacity="0.9" />
    <path d="M190 240L270 180L314 214L360 170L410 240Z" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="300" y="322" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="26" font-weight="700">No image available</text>
</svg>